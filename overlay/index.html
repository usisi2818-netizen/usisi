<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>USISI Overlay</title>
<!--
  OBS 방송용 오버레이 — "지금 트는 노래" 바 (NIGHT SIGNAL)
  사용법: OBS 브라우저 소스에 이 페이지 주소(.../overlay.html) 추가. 700x120 권장.
  admin > 오버레이 카드에서 곡 제목/가수를 저장하면 overlay_state(id=1)가 갱신되고
  이 바가 1.5초마다 폴링해 표시합니다. is_visible=true 여야 보입니다.
-->
<style>
:root{
  --ov-ice:#d4e9ff;
  --ov-blue:#8fc7ff;
  --ov-line:rgba(201,227,255,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;overflow:hidden;width:700px;height:120px}
.bar{
  display:inline-flex;align-items:center;height:90px;margin:15px 0 0 10px;
  padding:0 22px 0 8px;
  background:rgba(4,11,24,.84);
  border:1px solid var(--ov-line);
  box-shadow:0 10px 34px rgba(2,8,20,.5), inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  opacity:0;transition:opacity .5s ease, width .35s ease;max-width:460px;
}
.bar.visible{opacity:1}
.profile-wrap{flex-shrink:0;position:relative}
.profile-bg{width:74px;height:74px;border-radius:50%;background:linear-gradient(150deg,#14243f,#081226);overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid rgba(207,233,255,.6);box-shadow:0 0 0 5px rgba(169,213,255,.08), 0 0 22px rgba(133,200,255,.3)}
.profile-bg img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.song-info{overflow:hidden;padding:0 16px;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px}
.song-label{display:flex;align-items:center;gap:7px;font-family:"Arial",sans-serif;font-size:9px;font-weight:900;letter-spacing:.22em;color:rgba(185,220,255,.85)}
.song-label i{display:block;width:6px;height:6px;border-radius:50%;background:#a4d4ff;box-shadow:0 0 10px #85c8ff;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
.song-title-wrap{white-space:nowrap;overflow:hidden;max-width:330px}
.song-title-text{display:inline-block;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:19px;font-weight:700;color:#EAF4FF;white-space:nowrap;text-shadow:0 1px 6px rgba(0,0,0,.4)}
.song-artist{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:12px;font-weight:600;color:#9dccfb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em}
@media (prefers-reduced-motion:reduce){ .song-label i{animation:none} }
</style>
</head>
<body>
<div class="bar" id="bar">
  <div class="profile-wrap">
    <div class="profile-bg">
      <img src="https://profile.img.sooplive.co.kr/LOGO/nw/nwakdifl1/nwakdifl1.jpg" alt="" onerror="this.style.display='none'">
    </div>
  </div>
  <div class="song-info" id="songInfo">
    <div class="song-label"><i></i>NOW TUNED</div>
    <div class="song-title-wrap" id="titleWrap"><span class="song-title-text" id="titleText">우시시</span></div>
    <div class="song-artist" id="artistText"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb = null;
try {
  const URL_ = 'https://njkprtsozcdqssmkpfvo.supabase.co';
  if (typeof supabase !== 'undefined') {
    sb = supabase.createClient(URL_, 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qa3BydHNvemNkcXNzbWtwZnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MDg3NDUsImV4cCI6MjEwMDE4NDc0NX0.zisu2YFY4RIR94GXqeJ3u4O2T4LGMpduKQ2IwxHtZI8');
  }
} catch(e) {}
const MAX_WIDTH = 460;
let lastKey = null;

function fitBar(titleEl){
  requestAnimationFrame(()=>{
    const bar=document.getElementById('bar');
    const profileW=74+8+22;
    const textW=Math.min(Math.max(titleEl.scrollWidth, document.getElementById('artistText').scrollWidth)+44, MAX_WIDTH);
    bar.style.width=(profileW+textW+22)+'px';
  });
}

async function poll(){
  if (!sb) return;
  try {
    const { data } = await sb.from('overlay_state').select('*').eq('id',1).single();
    const bar=document.getElementById('bar');
    if(!data || !data.is_visible || !data.song_title){ bar.classList.remove('visible'); return; }
    const key=data.song_title+'|'+(data.song_artist||'');
    if(key===lastKey){ bar.classList.add('visible'); return; }
    lastKey=key;
    const titleEl=document.getElementById('titleText');
    const artistEl=document.getElementById('artistText');
    titleEl.textContent='🎵 '+data.song_title;
    artistEl.textContent = data.song_artist || '';
    fitBar(titleEl);
    bar.classList.add('visible');
  } catch(e){}
}
poll();
setInterval(poll, 1500);
</script>
</body>
</html>
