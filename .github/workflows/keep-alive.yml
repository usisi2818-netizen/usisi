name: keep-supabase-alive

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profile?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON }}"
